  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Loading…<\u002Ftitle>\n<style>\n  @font-face {\n    font-family: \"Manrope\";\n    src: url(\"001510bf-63f1-4851-a2b0-e2b93747d4c7\") format(\"woff2\");\n    font-weight: 200 800;\n    font-display: swap;\n  }\n  @font-face {\n    font-family: \"Inter\";\n    src: url(\"d73c9ace-e4a9-49ff-ae1c-a5daffe13a82\") format(\"woff2\");\n    font-weight: 100 900;\n    font-display: swap;\n  }\n\n  /* animatable angle props for the rainbow ring */\n  @property --progress {\n    syntax: \"<angle>\";\n    inherits: false;\n    initial-value: 0deg;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body { height: 100%; }\n\n  body {\n    background: #406372;\n    color: #fff;\n    font-family: \"Inter\", system-ui, sans-serif;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    min-height: 100vh;\n    gap: 32px;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .loader {\n    position: relative;\n    width: 152px;\n    height: 152px;\n    display: grid;\n    place-items: center;\n  }\n\n  /* faint track ring sitting behind the rainbow arc */\n  .loader::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    border-radius: 50%;\n    background: rgba(255, 255, 255, 0.12);\n    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 14px));\n            mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 14px));\n  }\n\n  /* the rainbow donut arc — fixed in place, fills as progress increases */\n  .ring {\n    position: absolute;\n    inset: 0;\n    border-radius: 50%;\n    background: conic-gradient(\n      from 0deg,\n      #da4a7e 0deg,\n      #9166b0 90deg,\n      #4fa9dc 180deg,\n      #84c064 260deg,\n      #d9d257 340deg,\n      #da4a7e 360deg\n    );\n    -webkit-mask: conic-gradient(from 0deg, #000 var(--progress), transparent 0);\n            mask: conic-gradient(from 0deg, #000 var(--progress), transparent 0);\n    animation: fill 30s ease-in-out infinite;\n  }\n\n  /* solid centre disc punches the donut hole */\n  .hole {\n    position: absolute;\n    inset: 14px;\n    border-radius: 50%;\n    background: #406372;\n  }\n\n  @keyframes fill {\n    0%   { --progress: 0deg; }\n    100% { --progress: 360deg; }\n  }\n\n  .caption {\n    font-family: \"Manrope\", system-ui, sans-serif;\n    font-weight: 600;\n    font-size: 20px;\n    letter-spacing: -0.01em;\n    color: rgba(255, 255, 255, 0.92);\n  }\n\n  .percent {\n    position: absolute;\n    inset: 0;\n    display: grid;\n    place-items: center;\n    font-family: \"Manrope\", system-ui, sans-serif;\n    font-weight: 700;\n    font-size: 30px;\n    letter-spacing: -0.02em;\n    color: #fff;\n    font-variant-numeric: tabular-nums;\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    .ring { animation: none; --progress: 300deg; }\n  }\n\n  /* ---- Container Run mini-game ---- */\n  .game {\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n    margin-top: 8px;\n  }\n\n  .game-head {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    gap: 16px;\n    font-family: \"Manrope\", system-ui, sans-serif;\n  }\n\n  .game-title {\n    font-size: 13px;\n    font-weight: 700;\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n    color: rgba(255, 255, 255, 0.55);\n  }\n\n  .game-score {\n    font-size: 13px;\n    font-weight: 600;\n    color: rgba(255, 255, 255, 0.85);\n    font-variant-numeric: tabular-nums;\n  }\n  .game-score b { color: #6FFFB6; font-weight: 700; }\n\n  .board-wrap {\n    position: relative;\n    border-radius: 12px;\n    overflow: hidden;\n    line-height: 0;\n  }\n\n  #board { display: block; background: transparent; }\n\n  .board-overlay {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 6px;\n    text-align: center;\n    padding: 16px;\n    background: rgba(64, 99, 114, 0.82);\n    backdrop-filter: blur(1px);\n    font-family: \"Manrope\", system-ui, sans-serif;\n    cursor: pointer;\n    transition: opacity 150ms ease;\n    line-height: 1.4;\n  }\n  .board-overlay.hidden { opacity: 0; pointer-events: none; }\n\n  .board-overlay .ov-title {\n    font-size: 20px;\n    font-weight: 700;\n    letter-spacing: -0.01em;\n    color: #fff;\n  }\n  .board-overlay .ov-sub {\n    font-size: 13px;\n    font-weight: 500;\n    color: rgba(255, 255, 255, 0.7);\n    max-width: 280px;\n    line-height: 1.45;\n  }\n  .board-overlay .ov-key {\n    font-family: \"Inter\", monospace;\n    font-size: 11px;\n    padding: 2px 7px;\n    border-radius: 4px;\n    background: rgba(255, 255, 255, 0.14);\n    color: #fff;\n  }\n\n  .game-hint {\n    font-family: \"Inter\", system-ui, sans-serif;\n    font-size: 11px;\n    color: rgba(255, 255, 255, 0.4);\n    text-align: center;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n  <div class=\"loader\" role=\"status\" aria-label=\"Loading\">\n    <div class=\"ring\"><\u002Fdiv>\n    <div class=\"hole\"><\u002Fdiv>\n    <div class=\"percent\" id=\"percent\">0%<\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"caption\" id=\"caption\">We are combining your bookings…<\u002Fp>\n\n  <section class=\"game\" aria-label=\"Container Run mini-game\">\n    <div class=\"game-head\">\n      <span class=\"game-title\">Depot Run · <span id=\"level\">Lvl 1<\u002Fspan><\u002Fspan>\n      <span class=\"game-score\">Parcels <b id=\"parcels\">0/10<\u002Fb> · Best Lvl <span id=\"best\">0<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"board-wrap\">\n      <canvas id=\"board\" width=\"384\" height=\"288\"><\u002Fcanvas>\n      <div class=\"board-overlay\" id=\"overlay\">\n        <div class=\"ov-title\" id=\"ovTitle\">Collect 10 parcels, then reach the depot<\u002Fdiv>\n        <div class=\"ov-sub\" id=\"ovSub\">Drive over parcels to load them — mint ones give a speed boost. After 10, the depot opens; deliver to clear the level. Higher levels add barriers and roaming forklifts to dodge. Steer with the arrow keys or swipe.<\u002Fdiv>\n        <div class=\"ov-sub\">Press <span class=\"ov-key\">↑ ↓ ← →<\u002Fspan> or tap to start driving<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"game-hint\">A little something while we work — your place in line is saved.<\u002Fp>\n  <\u002Fsection>\n\n  <script>\n    const messages = [\n      \"We are combining your bookings…\",\n      \"Almost there, we are still combining your bookings together…\",\n      \"Nearly done, thanks for your patience...\"\n    ];\n    const caption = document.getElementById(\"caption\");\n    let i = 0;\n    setInterval(() => {\n      i = (i + 1) % messages.length;\n      caption.textContent = messages[i];\n    }, 10000);\n\n    const ring = document.querySelector(\".ring\");\n    const percentEl = document.getElementById(\"percent\");\n    function tick() {\n      const angle = parseFloat(getComputedStyle(ring).getPropertyValue(\"--progress\")) || 0;\n      percentEl.textContent = Math.round((angle / 360) * 100) + \"%\";\n      requestAnimationFrame(tick);\n    }\n    requestAnimationFrame(tick);\n  <\u002Fscript>\n\n  <script>\n    (function () {\n      const canvas = document.getElementById(\"board\");\n      const ctx = canvas.getContext(\"2d\");\n      const W = canvas.width, H = canvas.height;\n      const levelEl = document.getElementById(\"level\");\n      const parcelsEl = document.getElementById(\"parcels\");\n      const bestEl = document.getElementById(\"best\");\n      const overlay = document.getElementById(\"overlay\");\n      const ovTitle = document.getElementById(\"ovTitle\");\n      const ovSub = document.getElementById(\"ovSub\");\n\n      const MINT = \"#6FFFB6\", BLUE = \"#4fa9dc\", CARGO = \"#f0a23b\";\n      const PARCEL = \"#f0a23b\", BOOST_COLOR = \"#6FFFB6\";\n      const SPEED = 96;          // px per second\n      const BOOST_MULT = 1.85;   // speed multiplier while boosted\n      const BOOST_MS = 6000;     // boost duration\n      const TRUCK_R = 9;         // truck half-size for hit tests\n      const WH = 30;             // warehouse half-size\n      const PARCEL_R = 8;        // parcel pickup radius\n      const MAX_PARCELS = 4;\n      const NEED = 10;           // parcels to collect before the depot opens\n      const HAZARD = \"#ef6a4a\";  // roaming forklift (hazard) colour\n      const BARRIER = \"#0d4254\"; // static barrier body\n      const STUN_MS = 650;       // stun after hitting a hazard\n\n      let truck, dirX, dirY, heading, started, last;\n      let level, collected, depot, depotActive, score;\n      let parcels, spawnTimer, boostUntil, obstacles, movers, stunUntil;\n      let levelMsg = \"\", levelMsgUntil = 0;\n      let best = 0;\n      try { best = parseInt(localStorage.getItem(\"depotRunBestLevel\") || \"0\", 10) || 0; } catch (e) {}\n      bestEl.textContent = best;\n\n      function rand(min, max) { return min + Math.random() * (max - min); }\n\n      function farPoint(from, minDist) {\n        let p, tries = 0;\n        do {\n          p = { x: rand(WH + 8, W - WH - 8), y: rand(WH + 8, H - WH - 8) };\n          tries++;\n        } while (from && Math.hypot(p.x - from.x, p.y - from.y) < minDist && tries < 40);\n        return p;\n      }\n\n      function reset() {\n        truck = { x: W / 2, y: H / 2 };\n        dirX = 0; dirY = 0;\n        heading = 0;\n        score = 0;\n        level = 1;\n        boostUntil = 0;\n        started = false;\n        setupLevel();\n        render(performance.now());\n      }\n\n      function overlaps(x, y, pad) {\n        for (const o of obstacles) {\n          if (x > o.x - pad && x < o.x + o.w + pad &&\n              y > o.y - pad && y < o.y + o.h + pad) return true;\n        }\n        return false;\n      }\n\n      function freePoint(from, minDist) {\n        let p, tries = 0;\n        do { p = farPoint(from, minDist); tries++; }\n        while (overlaps(p.x, p.y, 14) && tries < 60);\n        return p;\n      }\n\n      function setupLevel() {\n        truck.x = W / 2; truck.y = H / 2;\n        dirX = 0; dirY = 0;\n        collected = 0;\n        depotActive = false;\n        parcels = [];\n        spawnTimer = 0.4;\n        stunUntil = 0;\n        buildObstacles();\n        // make sure the start point is clear of barriers\n        let guard = 0;\n        while (overlaps(truck.x, truck.y, TRUCK_R + 8) && guard++ < 40) truck.y -= 12;\n        spawnMovers();\n        depot = freePoint(truck, 130);\n        parcelsEl.textContent = \"0/\" + NEED;\n        levelEl.textContent = \"Lvl \" + level;\n        levelMsg = \"Level \" + level;\n        levelMsgUntil = performance.now() + 1400;\n      }\n\n      function buildObstacles() {\n        obstacles = [];\n        const n = Math.min(4, level - 1);\n        for (let i = 0; i < n; i++) {\n          const horizontal = Math.random() < 0.5;\n          const len = rand(60, 110), thick = 16;\n          const w = horizontal ? len : thick;\n          const h = horizontal ? thick : len;\n          let x, y, tries = 0;\n          do {\n            x = rand(30, W - 30 - w);\n            y = rand(30, H - 30 - h);\n            tries++;\n          } while (Math.abs((x + w / 2) - W / 2) < 50 && Math.abs((y + h / 2) - H / 2) < 50 && tries < 40);\n          obstacles.push({ x, y, w, h });\n        }\n      }\n\n      function spawnMovers() {\n        movers = [];\n        const n = Math.max(0, Math.min(5, level - 2));\n        const sp = 50 + level * 8;\n        for (let i = 0; i < n; i++) {\n          const p = freePoint(truck, 90);\n          const ang = rand(0, Math.PI * 2);\n          movers.push({ x: p.x, y: p.y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, r: 9 });\n        }\n      }\n\n      function spawnParcel() {\n        if (depotActive) return;\n        if (parcels.length >= MAX_PARCELS) return;\n        if (collected + parcels.length >= NEED) return;\n        const p = freePoint(truck, 60);\n        // ~25% chance of being a speed-boost parcel\n        p.boost = Math.random() < 0.25;\n        p.born = performance.now();\n        p.life = p.boost ? 9000 : 12000; // parcels expire if ignored\n        parcels.push(p);\n      }\n\n      function update(dt, now) {\n        const stunned = now < stunUntil;\n        const boosted = now < boostUntil;\n        const speed = SPEED * (boosted ? BOOST_MULT : 1) * (stunned ? 0 : 1);\n\n        truck.x += dirX * speed * dt;\n        truck.y += dirY * speed * dt;\n        truck.x = Math.max(TRUCK_R, Math.min(W - TRUCK_R, truck.x));\n        truck.y = Math.max(TRUCK_R, Math.min(H - TRUCK_R, truck.y));\n        resolveObstacles();\n\n        // roaming forklifts\n        for (const m of movers) {\n          m.x += m.vx * dt; m.y += m.vy * dt;\n          if (m.x < m.r) { m.x = m.r; m.vx *= -1; }\n          if (m.x > W - m.r) { m.x = W - m.r; m.vx *= -1; }\n          if (m.y < m.r) { m.y = m.r; m.vy *= -1; }\n          if (m.y > H - m.r) { m.y = H - m.r; m.vy *= -1; }\n          for (const o of obstacles) {\n            const nx = Math.max(o.x, Math.min(m.x, o.x + o.w));\n            const ny = Math.max(o.y, Math.min(m.y, o.y + o.h));\n            const dx = m.x - nx, dy = m.y - ny;\n            if (dx * dx + dy * dy < m.r * m.r) {\n              if (Math.abs(dx) > Math.abs(dy)) m.vx *= -1; else m.vy *= -1;\n              m.x += m.vx * dt * 2; m.y += m.vy * dt * 2;\n            }\n          }\n          if (!stunned && Math.hypot(truck.x - m.x, truck.y - m.y) < TRUCK_R + m.r) {\n            stunUntil = now + STUN_MS;\n            boostUntil = 0;\n            const a = Math.atan2(truck.y - m.y, truck.x - m.x);\n            truck.x += Math.cos(a) * 16;\n            truck.y += Math.sin(a) * 16;\n          }\n        }\n\n        if (!depotActive) {\n          // collect parcels\n          for (let i = parcels.length - 1; i >= 0; i--) {\n            const p = parcels[i];\n            if (Math.hypot(truck.x - p.x, truck.y - p.y) < TRUCK_R + PARCEL_R) {\n              if (p.boost) boostUntil = now + BOOST_MS;\n              parcels.splice(i, 1);\n              collected++;\n              score += p.boost ? 3 : 2;\n              parcelsEl.textContent = collected + \"/\" + NEED;\n              if (collected >= NEED) {\n                depotActive = true;\n                parcels = [];\n                levelMsg = \"Depot open!\";\n                levelMsgUntil = now + 1200;\n              }\n            } else if (now - p.born > p.life) {\n              parcels.splice(i, 1);\n            }\n          }\n          spawnTimer -= dt;\n          if (spawnTimer <= 0) { spawnParcel(); spawnTimer = rand(1.0, 2.2); }\n        } else if (Math.hypot(truck.x - depot.x, truck.y - depot.y) < WH * 0.7) {\n          // deliver to the depot → next level\n          score += 25;\n          level++;\n          if (level - 1 > best) {\n            best = level - 1;\n            bestEl.textContent = best;\n            try { localStorage.setItem(\"depotRunBestLevel\", String(best)); } catch (e) {}\n          }\n          setupLevel();\n        }\n      }\n\n      function resolveObstacles() {\n        for (const o of obstacles) {\n          const nx = Math.max(o.x, Math.min(truck.x, o.x + o.w));\n          const ny = Math.max(o.y, Math.min(truck.y, o.y + o.h));\n          const dx = truck.x - nx, dy = truck.y - ny;\n          const d2 = dx * dx + dy * dy;\n          if (d2 < TRUCK_R * TRUCK_R) {\n            const d = Math.sqrt(d2);\n            if (d < 0.001) {\n              const left = truck.x - o.x, right = o.x + o.w - truck.x;\n              const top = truck.y - o.y, bot = o.y + o.h - truck.y;\n              const mn = Math.min(left, right, top, bot);\n              if (mn === left) truck.x = o.x - TRUCK_R;\n              else if (mn === right) truck.x = o.x + o.w + TRUCK_R;\n              else if (mn === top) truck.y = o.y - TRUCK_R;\n              else truck.y = o.y + o.h + TRUCK_R;\n            } else {\n              const push = TRUCK_R - d;\n              truck.x += (dx / d) * push;\n              truck.y += (dy / d) * push;\n            }\n          }\n        }\n      }\n\n      // ---- drawing ----\n      function roundRect(x, y, w, h, r) {\n        ctx.beginPath();\n        ctx.moveTo(x + r, y);\n        ctx.arcTo(x + w, y, x + w, y + h, r);\n        ctx.arcTo(x + w, y + h, x, y + h, r);\n        ctx.arcTo(x, y + h, x, y, r);\n        ctx.arcTo(x, y, x + w, y, r);\n        ctx.closePath();\n      }\n\n      function drawWarehouse(cx, cy, active, isDrop, now) {\n        const w = WH * 1.7, h = WH * 1.25;\n        const x = cx - w / 2, y = cy - h / 2;\n        if (active) {\n          const glow = 0.45 + Math.sin(now / 240) * 0.25;\n          ctx.save();\n          ctx.shadowColor = isDrop ? BLUE : MINT;\n          ctx.shadowBlur = 16 * (0.6 + glow);\n          ctx.fillStyle = \"rgba(255,255,255,0.06)\";\n          roundRect(x - 3, y - 3, w + 6, h + 6, 7);\n          ctx.fill();\n          ctx.restore();\n        }\n        // building body\n        ctx.fillStyle = active ? \"rgba(255,255,255,0.96)\" : \"rgba(255,255,255,0.45)\";\n        roundRect(x, y + h * 0.32, w, h * 0.68, 4);\n        ctx.fill();\n        // roof\n        ctx.fillStyle = active ? (isDrop ? BLUE : \"#043347\") : \"rgba(4,51,71,0.5)\";\n        ctx.beginPath();\n        ctx.moveTo(x - 2, y + h * 0.34);\n        ctx.lineTo(cx, y);\n        ctx.lineTo(x + w + 2, y + h * 0.34);\n        ctx.closePath();\n        ctx.fill();\n        // bay doors\n        ctx.fillStyle = active ? (isDrop ? \"#cde9f5\" : \"#d8fff0\") : \"rgba(4,51,71,0.18)\";\n        const doorW = w * 0.2, gap = w * 0.07;\n        for (let i = 0; i < 3; i++) {\n          roundRect(x + gap + i * (doorW + gap) + w * 0.04, y + h * 0.55, doorW, h * 0.4, 1.5);\n          ctx.fill();\n        }\n        // flag/label dot\n        ctx.fillStyle = isDrop ? BLUE : MINT;\n        ctx.beginPath();\n        ctx.arc(cx, y - 4, active ? 3.2 : 2.2, 0, Math.PI * 2);\n        ctx.fill();\n      }\n\n      function drawTruck(now) {\n        const boosted = now < boostUntil;\n        const stunned = now < stunUntil;\n        ctx.save();\n        if (stunned) ctx.globalAlpha = 0.45 + 0.4 * Math.abs(Math.sin(now / 60));\n        ctx.translate(truck.x, truck.y);\n        ctx.rotate(heading);\n        // boost trail\n        if (boosted && (dirX || dirY)) {\n          ctx.save();\n          ctx.globalAlpha = 0.5;\n          for (let i = 1; i <= 3; i++) {\n            ctx.fillStyle = BOOST_COLOR;\n            ctx.globalAlpha = 0.28 / i;\n            roundRect(-11 - i * 6, -5.5, 12, 11, 2.5);\n            ctx.fill();\n          }\n          ctx.restore();\n        }\n        // trailer\n        ctx.fillStyle = \"#0d4254\";\n        ctx.strokeStyle = MINT;\n        ctx.lineWidth = 1.3;\n        roundRect(-11, -6.5, 14, 13, 2.5);\n        ctx.fill();\n        ctx.stroke();\n        // cargo box shows once you're carrying parcels\n        if (collected > 0) {\n          ctx.fillStyle = CARGO;\n          roundRect(-9, -4.5, 9, 9, 1.5);\n          ctx.fill();\n          ctx.strokeStyle = \"rgba(0,0,0,0.18)\";\n          ctx.lineWidth = 1;\n          for (let i = 1; i <= 2; i++) {\n            ctx.beginPath();\n            ctx.moveTo(-9 + i * 3, -4);\n            ctx.lineTo(-9 + i * 3, 4);\n            ctx.stroke();\n          }\n        }\n        // cab\n        ctx.fillStyle = MINT;\n        roundRect(3, -7, 8, 14, 2.5);\n        ctx.fill();\n        // windscreen\n        ctx.fillStyle = \"#043347\";\n        roundRect(6.5, -5, 3, 10, 1);\n        ctx.fill();\n        // wheels\n        ctx.fillStyle = \"#021f2b\";\n        for (const wx of [-7, -1, 6.5]) {\n          ctx.beginPath();\n          ctx.arc(wx, 8, 2.2, 0, Math.PI * 2);\n          ctx.fill();\n        }\n        ctx.restore();\n      }\n\n      function drawParcel(p, now) {\n        const t = (now - p.born) / p.life;       // 0..1 lifetime\n        const fade = t > 0.8 ? (0.4 + 0.6 * Math.abs(Math.sin(now / 120))) : 1; // blink before expiring\n        const bob = Math.sin(now / 300 + p.x) * 1.2;\n        ctx.save();\n        ctx.globalAlpha = fade;\n        ctx.translate(p.x, p.y + bob);\n        if (p.boost) {\n          // glowing speed parcel\n          const glow = 0.5 + Math.sin(now / 160) * 0.4;\n          ctx.shadowColor = BOOST_COLOR;\n          ctx.shadowBlur = 12 * (0.6 + glow);\n        }\n        const s = 6;\n        ctx.fillStyle = p.boost ? BOOST_COLOR : PARCEL;\n        roundRect(-s, -s, s * 2, s * 2, 1.5);\n        ctx.fill();\n        ctx.shadowBlur = 0;\n        // tape cross\n        ctx.strokeStyle = p.boost ? \"rgba(4,51,71,0.55)\" : \"rgba(0,0,0,0.22)\";\n        ctx.lineWidth = 1.2;\n        ctx.beginPath();\n        ctx.moveTo(0, -s); ctx.lineTo(0, s);\n        ctx.moveTo(-s, 0); ctx.lineTo(s, 0);\n        ctx.stroke();\n        if (p.boost) {\n          // little lightning mark\n          ctx.fillStyle = \"#043347\";\n          ctx.beginPath();\n          ctx.moveTo(1.5, -3.2); ctx.lineTo(-2.2, 0.6);\n          ctx.lineTo(0.2, 0.6); ctx.lineTo(-1.5, 3.2);\n          ctx.lineTo(2.6, -0.8); ctx.lineTo(0.2, -0.8);\n          ctx.closePath(); ctx.fill();\n        }\n        ctx.restore();\n      }\n\n      function drawDepotHint() {\n        ctx.save();\n        ctx.strokeStyle = \"rgba(79,169,220,0.4)\";\n        ctx.lineWidth = 1.5;\n        ctx.setLineDash([4, 6]);\n        ctx.beginPath();\n        ctx.moveTo(truck.x, truck.y);\n        ctx.lineTo(depot.x, depot.y);\n        ctx.stroke();\n        ctx.restore();\n      }\n\n      function drawObstacle(o) {\n        ctx.save();\n        ctx.fillStyle = BARRIER;\n        roundRect(o.x, o.y, o.w, o.h, 3);\n        ctx.fill();\n        ctx.save();\n        roundRect(o.x, o.y, o.w, o.h, 3);\n        ctx.clip();\n        ctx.strokeStyle = \"rgba(217,210,87,0.7)\"; // hazard yellow\n        ctx.lineWidth = 5;\n        for (let i = -o.h; i < o.w + o.h; i += 12) {\n          ctx.beginPath();\n          ctx.moveTo(o.x + i, o.y);\n          ctx.lineTo(o.x + i + o.h, o.y + o.h);\n          ctx.stroke();\n        }\n        ctx.restore();\n        ctx.strokeStyle = \"rgba(255,255,255,0.15)\";\n        ctx.lineWidth = 1;\n        roundRect(o.x, o.y, o.w, o.h, 3);\n        ctx.stroke();\n        ctx.restore();\n      }\n\n      function drawMover(m, now) {\n        ctx.save();\n        ctx.translate(m.x, m.y);\n        ctx.rotate(Math.atan2(m.vy, m.vx));\n        ctx.shadowColor = HAZARD;\n        ctx.shadowBlur = 8;\n        ctx.fillStyle = HAZARD;\n        roundRect(-7, -6, 12, 12, 2.5);\n        ctx.fill();\n        ctx.shadowBlur = 0;\n        // forks\n        ctx.fillStyle = \"#021f2b\";\n        roundRect(5, -4, 6, 1.6, 0.5); ctx.fill();\n        roundRect(5, 2.4, 6, 1.6, 0.5); ctx.fill();\n        // cab window\n        ctx.fillStyle = \"#043347\";\n        roundRect(-4, -3.5, 5, 7, 1.5); ctx.fill();\n        // wheels\n        ctx.fillStyle = \"#021f2b\";\n        ctx.beginPath(); ctx.arc(-4, 7, 2, 0, Math.PI * 2); ctx.fill();\n        ctx.beginPath(); ctx.arc(3, 7, 2, 0, Math.PI * 2); ctx.fill();\n        ctx.restore();\n      }\n\n      function drawLevelMsg(now) {\n        if (now >= levelMsgUntil) return;\n        const t = (levelMsgUntil - now) / 1400;\n        ctx.save();\n        ctx.globalAlpha = Math.min(1, t * 1.6);\n        ctx.fillStyle = \"#fff\";\n        ctx.font = \"700 22px Manrope, sans-serif\";\n        ctx.textAlign = \"center\";\n        ctx.shadowColor = \"rgba(4,51,71,0.6)\";\n        ctx.shadowBlur = 8;\n        ctx.fillText(levelMsg, W / 2, H / 2 - 6);\n        ctx.restore();\n        ctx.textAlign = \"left\";\n      }\n\n      function render(now) {\n        ctx.fillStyle = \"#406372\";\n        ctx.fillRect(0, 0, W, H);\n        // subtle road grid\n        ctx.strokeStyle = \"rgba(255,255,255,0.045)\";\n        ctx.lineWidth = 1;\n        for (let x = 48; x < W; x += 48) {\n          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();\n        }\n        for (let y = 48; y < H; y += 48) {\n          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();\n        }\n\n        if (started && depotActive) drawDepotHint();\n        for (const o of obstacles) drawObstacle(o);\n        if (depotActive) drawWarehouse(depot.x, depot.y, true, true, now);\n        for (const p of parcels) drawParcel(p, now);\n        for (const m of movers) drawMover(m, now);\n        drawTruck(now);\n        drawBoostBar(now);\n        drawLevelMsg(now);\n      }\n\n      function drawBoostBar(now) {\n        if (now >= boostUntil) return;\n        const remain = (boostUntil - now) / BOOST_MS;\n        const bw = 54, bh = 5, x = W - bw - 10, y = 10;\n        ctx.fillStyle = \"rgba(4,51,71,0.45)\";\n        roundRect(x, y, bw, bh, 2.5); ctx.fill();\n        ctx.fillStyle = BOOST_COLOR;\n        roundRect(x, y, bw * remain, bh, 2.5); ctx.fill();\n        ctx.fillStyle = \"rgba(255,255,255,0.85)\";\n        ctx.font = \"600 9px Inter, sans-serif\";\n        ctx.textAlign = \"right\";\n        ctx.fillText(\"SPEED BOOST\", x + bw, y - 3);\n        ctx.textAlign = \"left\";\n      }\n\n      function loop(now) {\n        const dt = Math.min(0.05, (now - last) / 1000);\n        last = now;\n        if (started) update(dt, now);\n        render(now);\n        requestAnimationFrame(loop);\n      }\n\n      function setVel(x, y) {\n        dirX = x; dirY = y;\n        if (x !== 0 || y !== 0) heading = Math.atan2(y, x);\n      }\n\n      function handleStart() {\n        if (!started) {\n          started = true;\n          overlay.classList.add(\"hidden\");\n        }\n      }\n\n      const held = { up: false, down: false, left: false, right: false };\n      function applyHeld() {\n        let x = (held.right ? 1 : 0) - (held.left ? 1 : 0);\n        let y = (held.down ? 1 : 0) - (held.up ? 1 : 0);\n        if (x && y) { const inv = 1 / Math.sqrt(2); x *= inv; y *= inv; }\n        setVel(x, y);\n      }\n\n      window.addEventListener(\"keydown\", function (e) {\n        const k = e.key;\n        let handled = true;\n        if (k === \"ArrowUp\" || k === \"w\" || k === \"W\") held.up = true;\n        else if (k === \"ArrowDown\" || k === \"s\" || k === \"S\") held.down = true;\n        else if (k === \"ArrowLeft\" || k === \"a\" || k === \"A\") held.left = true;\n        else if (k === \"ArrowRight\" || k === \"d\" || k === \"D\") held.right = true;\n        else handled = false;\n        if (handled) { handleStart(); applyHeld(); e.preventDefault(); }\n      });\n      window.addEventListener(\"keyup\", function (e) {\n        const k = e.key;\n        if (k === \"ArrowUp\" || k === \"w\" || k === \"W\") held.up = false;\n        else if (k === \"ArrowDown\" || k === \"s\" || k === \"S\") held.down = false;\n        else if (k === \"ArrowLeft\" || k === \"a\" || k === \"A\") held.left = false;\n        else if (k === \"ArrowRight\" || k === \"d\" || k === \"D\") held.right = false;\n        else return;\n        applyHeld();\n      });\n\n      // touch: drag to steer toward finger; release to stop\n      const wrap = canvas.parentElement;\n      let touching = false;\n      function steerToTouch(t) {\n        const r = canvas.getBoundingClientRect();\n        const tx = (t.clientX - r.left) * (W / r.width);\n        const ty = (t.clientY - r.top) * (H / r.height);\n        const dx = tx - truck.x, dy = ty - truck.y;\n        const d = Math.hypot(dx, dy) || 1;\n        if (d < 6) { setVel(0, 0); return; }\n        setVel(dx / d, dy / d);\n      }\n      wrap.addEventListener(\"touchstart\", function (e) {\n        handleStart(); touching = true; steerToTouch(e.touches[0]); e.preventDefault();\n      }, { passive: false });\n      wrap.addEventListener(\"touchmove\", function (e) {\n        if (touching) { steerToTouch(e.touches[0]); e.preventDefault(); }\n      }, { passive: false });\n      wrap.addEventListener(\"touchend\", function () {\n        touching = false; setVel(0, 0);\n      }, { passive: true });\n      overlay.addEventListener(\"click\", handleStart);\n\n      reset();\n      last = performance.now();\n      requestAnimationFrame(loop);\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
